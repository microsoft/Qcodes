# SIMULATED INSTRUMENT FOR Keysight 33xxx series function generator
spec: "1.0"
devices:
  device 1:
    eom:
      GPIB INSTR:
        q: "\n"
        r: "\n"
    error: ERROR
    dialogues:
      - q: "*IDN?"
        r: "QCoDeS, 33522B, 1, 0.1"

    properties:

      sync output:
        default: 0
        getter:
          q: "OUTPut:SYNC?"
          r: "{}"
        setter:
          q: "OUTPut:SYNC {}"

      sync output source:
        default: CH1
        getter:
          q: "OUTPut:SYNC:SOURce?"
          r: "{}"
        setter:
          q: "OUTPut:SYNC:SOURce {}"

      chan1 function type:
        default: SIN
        getter:
          q: "SOURce1:FUNCtion?"
          r: "{}"
        setter:
          q: "SOURce1:FUNCtion {}"

      chan1 burst ncycles:
        default: 1
        getter:
          q: "SOURce1:BURSt:NCYCLes?"
          r: "{}"
        setter:
          q: "SOURce1:BURSt:NCYCles {}"

      chan1 edges:
        default: 4.000000000000000E-09
        getter:
          q: "SOURce1:FUNCtion:PULSe:TRANsition?"
          r: "{:.8E}"
        setter:
          q: "SOURce1:FUNCtion:PULSe:TRANsition {}"
        specs:
          type: float

      chan1 load:
        default: 5.000000000000000E+01
        getter:
          q: "OUTPut1:LOAD?"
          r: "{:.8E}"
        setter:
          q: "OUTPut1:LOAD {}"
        specs:
          type: float

      chan1 auto_range:
        default: 1
        getter:
          q: "SOURce1:VOLTage:RANGe:AUTO?"
          r: "{}"
        setter:
          q: "SOURce1:VOLTage:RANGe:AUTO {}"
        specs:
          type: int
          valid: [ 0, 1 ]

      chan1 srate:
        default: 4.000000000000000E+04
        getter:
          q: "SOURce:FUNCtion:ARBitrary:SRATe?"
          r: "{:.8E}"
        setter:
          q: "SOURce:FUNCtion:ARBitrary:SRATe {}"
        specs:
          type: float

resources:
  GPIB::1::INSTR:
    device: device 1
